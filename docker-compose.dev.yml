# Development overrides — use with: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# The Makefile handles this automatically via `make up`.
#
# Ollama runs locally for full GPU + RAM access.
# Start it separately: ollama serve

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5433}:5432"

  redis:
    command: redis-server --save 60 1 --loglevel warning
