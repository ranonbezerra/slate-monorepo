[tool.poetry]
name = "dailyloadout"
version = "0.1.0"
description = "DailyLoadout API — gaming session planner powered by local LLMs"
authors = ["Ranon Bezerra"]
license = "AGPL-3.0-or-later"
packages = [{ include = "dailyloadout", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.14,<4.0"
fastapi = ">=0.115"
uvicorn = { version = "*", extras = ["standard"] }
pydantic = ">=2"
pydantic-settings = "*"
sqlalchemy = { version = ">=2", extras = ["asyncio"] }
asyncpg = "*"
alembic = "*"
taskiq = "*"
taskiq-redis = "*"
redis = { version = "*", extras = ["hiredis"] }
httpx = "*"
structlog = "*"
pyrate-limiter = ">=3"
python-jose = { version = "*", extras = ["cryptography"] }
passlib = { version = "*", extras = ["bcrypt"] }
python-multipart = "*"
jinja2 = "*"
sentry-sdk = { version = "*", extras = ["fastapi"], optional = true }
email-validator = "^2.3.0"
scalar-fastapi = "^1.8.2"
faster-whisper = "^1.2.1"
pillow = "^12.2.0"
pillow-heif = "^1.4.0"
pytesseract = "^0.3.13"
rapidfuzz = "^3.10.0"
langgraph = "*"
langgraph-checkpoint = "*"
langchain-ollama = "*"

[tool.poetry.extras]
sentry = ["sentry-sdk"]

[tool.poetry.group.dev.dependencies]
pytest = "*"
pytest-asyncio = "*"
pytest-cov = "*"
factory-boy = "*"
ruff = "*"
mypy = "*"
httpx = "*"
aiosqlite = "^0.22.1"
greenlet = "^3.5.1"
bandit = "^1.9.4"
typos = "^1.47.2"
pytest-env = "^1.6.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

# ---------------------------------------------------------------------------
# Tooling
# ---------------------------------------------------------------------------

[tool.ruff]
line-length = 99
target-version = "py313"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "S", "C90", "N", "ASYNC", "RUF"]
ignore = ["S104", "B008", "S101", "S105"]

[tool.ruff.lint.per-file-ignores]
"src/dailyloadout/api/v1/capture.py" = ["ASYNC240"]
"tests/**" = ["S106"]

[tool.ruff.lint.mccabe]
max-complexity = 12

[tool.ruff.lint.pylint]
max-args = 10

[tool.mypy]
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["error"]
env = [
    "APP_ENV=testing",
    "DATABASE_URL=sqlite+aiosqlite://",
    "BCRYPT_ROUNDS=4",
    # Pin AI providers to dummies so tests never depend on a developer's local
    # .env (e.g. RESEARCH_PROVIDER=searxng) or hit real network/LLM services.
    "AGENT_PROVIDER=dummy",
    "RESEARCH_PROVIDER=dummy",
    "LLM_PROVIDER=dummy",
    "CONCIERGE_PROVIDER=dummy",
]

[tool.coverage.run]
branch = true
source = ["src/dailyloadout"]
omit = [
    "src/dailyloadout/main.py",
    # External service adapters — tested via integration tests, not unit tests.
    "src/dailyloadout/infrastructure/llm/ollama.py",
    "src/dailyloadout/infrastructure/igdb/client.py",
    "src/dailyloadout/infrastructure/stt/whisper.py",
    # OCR adapters: local Tesseract needs the binary; the vision fallback wraps
    # the LLM vision API. Both are external-service adapters, integration-tested
    # only — the escalation/cap business logic is tested in the import processor.
    "src/dailyloadout/infrastructure/ocr/tesseract.py",
    "src/dailyloadout/infrastructure/ocr/vision.py",
    # Redis cache adapter — needs a live Redis, integration-tested only.
    "src/dailyloadout/infrastructure/cache/redis_cache.py",
    # ChatOllama tool-calling path — exercised only with a real model, not in CI.
    "src/dailyloadout/infrastructure/agent/concierge/langgraph_agent.py",
]

[tool.coverage.report]
fail_under = 90
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

[tool.bandit]
exclude_dirs = ["tests", "alembic"]
skips = ["B101"]

[tool.typos.default.extend-words]
# Game-domain words that typos may flag
loadout = "loadout"
loadouts = "loadouts"
debrief = "debrief"
debriefs = "debriefs"

[tool.typos.files]
extend-exclude = ["*.lock", "alembic/versions/*"]
