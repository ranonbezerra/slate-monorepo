name: app
description: "DailyLoadout — gaming backlog manager"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  bloc: ^9.0.0
  cupertino_icons: ^1.0.8
  dio: ^5.8.0+1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  flutter_dotenv: ^5.2.1
  flutter_secure_storage: ^9.2.4
  go_router: ^15.1.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  logger: ^2.5.0
  record: ^6.2.1
  uuid: ^4.5.1

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^7.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app-icon.png"
  adaptive_icon_background: "#121119"
  adaptive_icon_foreground: "assets/icon/app-icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env.example
    - assets/icon/
