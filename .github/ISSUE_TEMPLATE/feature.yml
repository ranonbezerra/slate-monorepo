name: Feature Request
description: Suggest a feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Package
      options:
        - api
        - app
        - web
        - infra
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What do you want?
      placeholder: Describe the feature
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why?
      placeholder: What problem does this solve?
    validations:
      required: true
