name: CI — Web

on:
  pull_request:
    paths:
      - "packages/web/**"
      - ".github/workflows/ci-web.yml"
  push:
    branches: [main]
    paths:
      - "packages/web/**"
      - ".github/workflows/ci-web.yml"

defaults:
  run:
    working-directory: packages/web

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome check
        run: bun run lint

      - name: TypeScript check
        run: bun run tsc -b --noEmit

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
