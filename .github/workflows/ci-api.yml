name: CI — API

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "packages/api/**"
      - ".github/workflows/ci-api.yml"

defaults:
  run:
    working-directory: packages/api

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - "packages/api/**"
              - ".github/workflows/ci-api.yml"

  api-quality:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: packages/api/.venv
          key: api-venv-${{ runner.os }}-py3.14-${{ hashFiles('packages/api/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Ruff check
        run: poetry run ruff check .

      - name: Ruff format check
        run: poetry run ruff format --check .

      - name: Mypy
        run: poetry run mypy src/

      - name: Bandit security scan
        run: poetry run bandit -r src/ -ll -ii -c pyproject.toml

      - name: Typos spell check
        run: poetry run typos src/ tests/

  api-test:
    needs: [changes, api-quality]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: slate
          POSTGRES_PASSWORD: slate
          POSTGRES_DB: slate_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U slate"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Install Poetry
        run: pipx install poetry

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: packages/api/.venv
          key: api-venv-${{ runner.os }}-py3.14-${{ hashFiles('packages/api/poetry.lock') }}

      - name: Install dependencies
        run: poetry install --no-interaction

      # The bare CI Postgres has no extensions; prod creates them via
      # infra/postgres/init.sql. Mirror that so the migrations (GIN trgm index,
      # gen_random_uuid, citext) can apply. asyncpg is already in the venv.
      - name: Create Postgres extensions
        run: |
          poetry run python - <<'PY'
          import asyncio, asyncpg
          async def main():
              c = await asyncpg.connect("postgresql://slate:slate@localhost:5433/slate_test")
              for ext in ("citext", "pg_trgm", "pgcrypto"):
                  await c.execute(f"CREATE EXTENSION IF NOT EXISTS {ext}")
              await c.close()
          asyncio.run(main())
          PY

      # Pre-merge migration gate: a broken `alembic upgrade head` fails the PR
      # check before it can ever reach prod. Runs against the fresh Postgres
      # service (tests themselves use sqlite). Catches structural breakage; a
      # prod-data-dependent failure is still caught by the deploy-time gate.
      - name: Migrations apply cleanly (fresh Postgres)
        env:
          DATABASE_URL: postgresql+asyncpg://slate:slate@localhost:5433/slate_test
          # MUST be "testing" (not "test") — only development/testing skip the
          # production guards; "test" is treated as prod and the secret-key guard
          # would fail config import. (pytest gets this from pyproject env.)
          APP_ENV: testing
          SECRET_KEY: test-secret-not-used-because-testing-skips-prod-guard # pragma: allowlist secret
        run: |
          poetry run alembic upgrade head
          # Reversibility smoke (non-blocking): a full down+up roundtrip.
          poetry run alembic downgrade base && poetry run alembic upgrade head \
            || echo "::warning::migrations are not cleanly reversible (down+up roundtrip failed)"

      - name: Pytest with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://slate:slate@localhost:5433/slate_test
          REDIS_URL: redis://localhost:6380/0
          APP_ENV: test
          SECRET_KEY: test-secret
        run: poetry run pytest -n auto --cov=src/slate --cov-report=term-missing --cov-fail-under=90

  api-status:
    if: always()
    needs: [changes, api-quality, api-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check status
        working-directory: .
        run: |
          if [ "${{ needs.changes.outputs.api }}" != "true" ]; then
            echo "No API changes detected — skipping."
            exit 0
          fi
          if [ "${{ needs.api-quality.result }}" != "success" ]; then
            echo "API quality checks failed."
            exit 1
          fi
          if [ "${{ needs.api-test.result }}" != "success" ]; then
            echo "API tests failed."
            exit 1
          fi
          echo "All API checks passed."
