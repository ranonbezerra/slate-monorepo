# Minimal SearXNG config for DailyLoadout deep-research briefings.
# The JSON format is required by SearxngResearchClient and is disabled by
# default upstream, so it is enabled explicitly here.
use_default_settings: true

server:
  # Placeholder only — override via the SEARXNG_SECRET env var in production.
  secret_key: "change-me-in-prod-searxng"  # pragma: allowlist secret
  limiter: false
  image_proxy: false

search:
  safe_search: 1
  formats:
    - html
    - json
